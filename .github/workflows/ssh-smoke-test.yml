name: SSH Smoke Test

on:
  workflow_dispatch:

jobs:
  test-ssh:
    runs-on: ubuntu-latest
    steps:
      - name: SSH smoke test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_IP }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 20m
          script: |
            set -e
            whoami
            hostname
            pwd
            echo "SSH_OK"
