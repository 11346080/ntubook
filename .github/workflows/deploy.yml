name: Django CI/CD Deploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH to GCP VM and Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_IP }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: 22
          script_stop: true
          debug: true
          script: |
            set -e

            whoami
            echo "$HOME"
            hostname

            BRANCH="${{ github.ref_name }}"

            if [ "$BRANCH" = "main" ]; then
              TARGET_DIR="/var/www/ntubook"
              FRONTEND_PORT="3000"
              BACKEND_PORT="8000"
              PM2_NAME="ntubook-next-main"
            elif [ "$BRANCH" = "dev" ]; then
              TARGET_DIR="/var/www/ntubook_dev"
              FRONTEND_PORT="3001"
              BACKEND_PORT="8001"
              PM2_NAME="ntubook-next-dev"
            else
              echo "Unsupported branch: $BRANCH"
              exit 1
            fi

            echo "=== Deploy branch: $BRANCH ==="
            echo "TARGET_DIR=$TARGET_DIR"
            echo "FRONTEND_PORT=$FRONTEND_PORT"
            echo "BACKEND_PORT=$BACKEND_PORT"
            echo "PM2_NAME=$PM2_NAME"

            cd "$TARGET_DIR"

            echo "=== Git update ==="
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
            git clean -fd

            echo "=== Backend env check ==="
            if [ ! -f "$TARGET_DIR/backend/.env" ]; then
              if [ -f "$TARGET_DIR/.env" ]; then
                cp "$TARGET_DIR/.env" "$TARGET_DIR/backend/.env"
              else
                echo "ERROR: backend/.env and root .env both missing"
                exit 1
              fi
            fi

            echo "=== Ensure backend logs dir ==="
            mkdir -p "$TARGET_DIR/backend/logs"
            touch "$TARGET_DIR/backend/logs/django.log"
            chmod 664 "$TARGET_DIR/backend/logs/django.log" || true

            echo "=== Python deps ==="
            cd "$TARGET_DIR/backend"
            "$TARGET_DIR/venv/bin/pip" install -r "$TARGET_DIR/requirements.txt"

            echo "=== Django check / migrate / collectstatic ==="
            "$TARGET_DIR/venv/bin/python" manage.py check
            "$TARGET_DIR/venv/bin/python" manage.py migrate
            "$TARGET_DIR/venv/bin/python" manage.py collectstatic --noinput

            echo "=== Restart gunicorn ==="
            pkill -f "gunicorn ntub_usedbooks.wsgi:application --bind 127.0.0.1:$BACKEND_PORT" || true

            nohup "$TARGET_DIR/venv/bin/gunicorn" ntub_usedbooks.wsgi:application \
              --bind "127.0.0.1:$BACKEND_PORT" \
              --workers 3 \
              > "$TARGET_DIR/backend/gunicorn.log" 2>&1 &

            sleep 5
            curl -I "http://127.0.0.1:$BACKEND_PORT"

            echo "=== Frontend install / build ==="
            cd "$TARGET_DIR/frontend"
            npm ci
            npm run build

            echo "=== Restart Next.js with PM2 ==="
            pm2 delete "$PM2_NAME" || true
            PORT="$FRONTEND_PORT" pm2 start npm --name "$PM2_NAME" -- start -- --port "$FRONTEND_PORT"
            pm2 save

            sleep 8
            curl -I "http://127.0.0.1:$FRONTEND_PORT"

            echo "=== Reload nginx ==="
            sudo nginx -t
            sudo systemctl reload nginx

            echo "=== Final health check ==="
            curl -I "http://127.0.0.1:$BACKEND_PORT"
            curl -I "http://127.0.0.1:$FRONTEND_PORT"
            echo "=== Deploy finished successfully ==="
