name: NTUBook Auto Deploy

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_IP }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: 22
          script_stop: true
          debug: true
          script: |
            set -e

            TARGET_DIR="/var/www/ntubook_dev"
            FRONTEND_PORT="3000"
            BACKEND_PORT="8000"
            PM2_NAME="ntubook-next"

            echo "=== Deploy dev only ==="
            echo "TARGET_DIR=$TARGET_DIR"

            cd "$TARGET_DIR"

            echo "=== Git update ==="
            git fetch origin dev
            git reset --hard origin/dev
            git clean -fd

            echo "=== Backend env check ==="
            if [ ! -f "$TARGET_DIR/backend/.env" ]; then
              if [ -f "$TARGET_DIR/.env" ]; then
                cp "$TARGET_DIR/.env" "$TARGET_DIR/backend/.env"
              else
                echo "ERROR: backend/.env and root .env both missing"
                exit 1
              fi
            fi

            echo "=== Python deps ==="
            "$TARGET_DIR/venv/bin/pip" install -r "$TARGET_DIR/requirements.txt"

            echo "=== Django check / migrate / collectstatic ==="
            cd "$TARGET_DIR/backend"
            "$TARGET_DIR/venv/bin/python" manage.py check
            "$TARGET_DIR/venv/bin/python" manage.py migrate
            "$TARGET_DIR/venv/bin/python" manage.py collectstatic --noinput

            echo "=== Restart gunicorn ==="
            pkill -f "gunicorn ntub_usedbooks.wsgi:application --bind 127.0.0.1:$BACKEND_PORT" || true

            nohup "$TARGET_DIR/venv/bin/gunicorn" ntub_usedbooks.wsgi:application \
              --bind 127.0.0.1:$BACKEND_PORT \
              --workers 3 \
              > "$TARGET_DIR/backend/gunicorn.log" 2>&1 &

            sleep 3
            curl -I "http://127.0.0.1:$BACKEND_PORT"

            echo "=== Frontend build ==="
            cd "$TARGET_DIR/frontend"
            npm ci
            npm run build

            echo "=== Restart Next.js with PM2 ==="
            pm2 delete "$PM2_NAME" || true
            PORT="$FRONTEND_PORT" pm2 start npm --name "$PM2_NAME" --cwd "$TARGET_DIR/frontend" -- start -- --port "$FRONTEND_PORT"
            pm2 save

            sleep 5
            curl -I "http://127.0.0.1:$FRONTEND_PORT"

            echo "=== Reload nginx ==="
            sudo nginx -t
            sudo systemctl reload nginx

            echo "=== Health check ==="
            curl -I -H "Host: test.ntubook.com" http://127.0.0.1/
            curl -I -H "Host: test.ntubook.com" http://127.0.0.1/admin/
            echo "=== Deploy finished successfully ==="
