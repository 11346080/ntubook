name: NTUBook Test Auto Deploy

on:
  push:
    branches:
      - dev

concurrency:
  group: ntubook-dev-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_IP }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: 22
          debug: true
          command_timeout: 30m
          script: |
            set -Eeuo pipefail

            TARGET_DIR="/var/www/ntubook_dev"
            FRONTEND_PORT="3000"
            BACKEND_PORT="8000"
            PM2_NAME="ntubook-next"
            LOG_DIR="$TARGET_DIR/deploy-logs"

            export NEXT_TELEMETRY_DISABLED=1
            export npm_config_cache="$TARGET_DIR/.npm-cache"

            echo "=== Deploy test site ==="
            echo "TARGET_DIR=$TARGET_DIR"
            echo "FRONTEND_PORT=$FRONTEND_PORT"
            echo "BACKEND_PORT=$BACKEND_PORT"
            echo "PM2_NAME=$PM2_NAME"
            date

            cd "$TARGET_DIR"

            PREV_COMMIT="$(git rev-parse HEAD 2>/dev/null || true)"

            echo "=== Git update ==="
            git fetch origin dev
            git reset --hard origin/dev
            git clean -fd
            mkdir -p "$LOG_DIR"

            NEW_COMMIT="$(git rev-parse HEAD)"
            echo "PREV_COMMIT=${PREV_COMMIT:-<none>}"
            echo "NEW_COMMIT=$NEW_COMMIT"

            if [ -n "${PREV_COMMIT:-}" ]; then
              CHANGED_FILES="$(git diff --name-only "$PREV_COMMIT" "$NEW_COMMIT" || true)"
            else
              CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "$NEW_COMMIT" || true)"
            fi

            echo "=== Changed files ==="
            echo "$CHANGED_FILES"

            FRONTEND_CHANGED=false
            FRONTEND_DEPS_CHANGED=false

            if echo "$CHANGED_FILES" | grep -E '^frontend/' >/dev/null 2>&1; then
              FRONTEND_CHANGED=true
            fi

            if [ ! -d "$TARGET_DIR/frontend/node_modules" ]; then
              FRONTEND_DEPS_CHANGED=true
            elif echo "$CHANGED_FILES" | grep -E '^frontend/(package\.json|package-lock\.json)$' >/dev/null 2>&1; then
              FRONTEND_DEPS_CHANGED=true
            fi

            echo "FRONTEND_CHANGED=$FRONTEND_CHANGED"
            echo "FRONTEND_DEPS_CHANGED=$FRONTEND_DEPS_CHANGED"

            echo "=== Frontend env setup ==="
            cat > "$TARGET_DIR/frontend/.env.production.local" <<'EOF'
            NEXT_PUBLIC_API_URL=https://test.ntubook.com
            EOF

            echo "=== Backend env check ==="
            if [ ! -f "$TARGET_DIR/backend/.env" ]; then
              if [ -f "$TARGET_DIR/.env" ]; then
                cp "$TARGET_DIR/.env" "$TARGET_DIR/backend/.env"
              else
                echo "ERROR: backend/.env and root .env both missing"
                exit 1
              fi
            fi

            echo "=== Python deps ==="
            date
            time "$TARGET_DIR/venv/bin/pip" install --disable-pip-version-check -r "$TARGET_DIR/requirements.txt"

            echo "=== Django check / migrate / collectstatic ==="
            cd "$TARGET_DIR/backend"
            date
            time "$TARGET_DIR/venv/bin/python" manage.py check
            time "$TARGET_DIR/venv/bin/python" manage.py migrate
            time "$TARGET_DIR/venv/bin/python" manage.py collectstatic --noinput

            echo "=== Restart gunicorn ==="
            OLD_PIDS="$(lsof -ti tcp:${BACKEND_PORT} -sTCP:LISTEN || true)"
            if [ -n "$OLD_PIDS" ]; then
              echo "Killing old gunicorn listener on port ${BACKEND_PORT}: $OLD_PIDS"
              kill -TERM $OLD_PIDS || true
              sleep 2
            fi

            nohup "$TARGET_DIR/venv/bin/gunicorn" ntub_usedbooks.wsgi:application \
              --bind 127.0.0.1:$BACKEND_PORT \
              --workers 3 \
              > "$TARGET_DIR/backend/gunicorn.log" 2>&1 &

            sleep 2
            echo "=== Wait for gunicorn (up to 30s) ==="
            for i in $(seq 1 15); do
              if curl -fsSI "http://127.0.0.1:$BACKEND_PORT" >/dev/null 2>&1; then
                echo "Gunicorn is up on port $BACKEND_PORT"
                break
              fi
              if [ "$i" -eq 15 ]; then
                echo "Gunicorn failed after 30s"
                tail -n 100 "$TARGET_DIR/backend/gunicorn.log" || true
                exit 1
              fi
              sleep 2
            done

            if [ "$FRONTEND_CHANGED" = true ]; then
              echo "=== Frontend build ==="
              cd "$TARGET_DIR/frontend"

              if [ "$FRONTEND_DEPS_CHANGED" = true ]; then
                echo "=== Frontend install (npm ci) ==="
                date
                time npm ci --prefer-offline --no-audit --progress=false 2>&1 | tee "$LOG_DIR/frontend-install.log"
              else
                echo "=== Skip npm ci (package.json/package-lock.json unchanged) ==="
              fi

              echo "=== Frontend build run ==="
              date
              time npm run build 2>&1 | tee "$LOG_DIR/frontend-build.log"

              echo "=== Restart Next.js with PM2 ==="
              if pm2 describe "$PM2_NAME" >/dev/null 2>&1; then
                pm2 delete "$PM2_NAME" || true
              fi

              pm2 start npm \
                --name "$PM2_NAME" \
                --cwd "$TARGET_DIR/frontend" \
                -- start -- --port "$FRONTEND_PORT"

              pm2 save
            else
              echo "=== Skip frontend build/restart (no frontend changes detected) ==="
            fi

            echo "=== Wait for Next.js (up to 60s) ==="
            for i in $(seq 1 30); do
              if curl -fsSI "http://127.0.0.1:$FRONTEND_PORT" >/dev/null 2>&1; then
                echo "Next.js is up on port $FRONTEND_PORT"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Next.js failed to listen on port $FRONTEND_PORT after 60s"
                pm2 describe "$PM2_NAME" || true
                pm2 logs "$PM2_NAME" --lines 100 --nostream || true
                [ -f "$LOG_DIR/frontend-build.log" ] && tail -n 200 "$LOG_DIR/frontend-build.log" || true
                exit 1
              fi
              echo "Waiting for Next.js... ($i/30)"
              sleep 2
            done

            echo "=== Reload nginx ==="
            sudo nginx -t
            sudo systemctl reload nginx

            echo "=== Health checks ==="
            curl -I http://127.0.0.1
            curl -I -H "Host: test.ntubook.com" http://127.0.0.1
            curl -I -H "Host: test.ntubook.com" http://127.0.0.1/admin/

            echo "=== Deploy finished successfully ==="
            date
