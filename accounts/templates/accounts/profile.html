{% extends "base.html" %}

{% block title %}個人資料 - 北商傳書{% endblock %}

{% block content %}
<div class="container">
    <h1 class="my-4">個人資料</h1>
    
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">使用者資訊</h5>
            <p><strong>使用者名稱：</strong>{{ user.username }}</p>
            <p><strong>電子郵件：</strong>{{ user.email }}</p>
            <p><strong>帳號狀態：</strong>{{ user.get_account_status_display }}</p>
        </div>
    </div>
    
    <div class="mt-3">
        <a href="{% url 'accounts:dashboard' %}" class="btn btn-secondary">返回儀表板</a>
    </div>
</div>
{% endblock %}
