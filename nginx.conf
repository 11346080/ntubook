# Nginx Configuration for NTUB Used Books Platform
# Domain: test.ntubook.com
# Frontend: Next.js (localhost:3000)
# Backend: Django + Gunicorn (localhost:8000)

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    ##
    # Basic Settings
    ##
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # Logging
    ##
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '"$http_x_forwarded_for" rt=$request_time '
                    'uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    ##
    # Gzip Settings
    ##
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    ##
    # Upstream definitions
    ##
    upstream django_app {
        server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream nextjs_app {
        server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    ##
    # 1. HTTP Redirect to HTTPS
    ##
    server {
        listen 80;
        listen [::]:80;
        server_name test.ntubook.com www.test.ntubook.com;

        # 強制所有請求跳轉至 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    ##
    # 2. HTTPS Server (Main)
    ##
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name test.ntubook.com www.test.ntubook.com;

        # SSL Configuration
        ssl_certificate /etc/letsencrypt/live/test.ntubook.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/test.ntubook.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/test.ntubook.com/chain.pem;

        # SSL Protocols and Ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;

        # SSL Session
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4;
        resolver_timeout 5s;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        
        # 注意：Content-Security-Policy 視情況調整，若前端有使用外部資源需開放
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://cdnjs.cloudflare.com https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self';" always;

        # Logging
        access_log /var/log/nginx/test.ntubook.com.access.log main;
        error_log /var/log/nginx/test.ntubook.com.error.log warn;

        ##
        # A. Static Files (Django 後端靜態資源)
        ##
        location /static/ {
            alias /var/www/ntubook/backend/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        ##
        # B. Media Files (使用者上傳圖片)
        ##
        location /media/ {
            alias /var/www/ntubook/backend/media/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        ##
        # C. API Routes (導向 Django)
        ##
        location /api/ {
            proxy_pass http://django_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }

        ##
        # D. Admin & Swagger (導向 Django)
        ##
        location ~ ^/(admin|swagger|redoc) {
            proxy_pass http://django_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        ##
        # E. Default Route (所有其他請求導向 Next.js)
        ##
        location / {
            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Next.js 頁面響應時間設定
            proxy_read_timeout 30s;
        }

        # 禁止訪問隱藏檔案 (例如 .env)
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}